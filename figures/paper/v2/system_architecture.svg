<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#304860"/></marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #17365d; }
      .label { font: 600 19px Arial, sans-serif; fill: #17365d; }
      .body { font: 16px Arial, sans-serif; fill: #273746; }
      .small { font: 14px Arial, sans-serif; fill: #536878; }
      .box { stroke: #304860; stroke-width: 2; rx: 14; }
      .line { stroke: #304860; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="560" fill="white"/>
  <text x="600" y="45" text-anchor="middle" class="title">Cloud-Edge-Device MEC System with Capacity-Feasible Offloading</text>

  <rect x="48" y="105" width="270" height="365" class="box" fill="#e9f3fb"/>
  <text x="183" y="140" text-anchor="middle" class="label">Mobile devices</text>
  <g fill="#6fa8dc" stroke="#1f4e79" stroke-width="2">
    <rect x="83" y="180" width="78" height="122" rx="10"/><rect x="204" y="180" width="78" height="122" rx="10"/>
    <rect x="83" y="335" width="78" height="92" rx="10"/><rect x="204" y="335" width="78" height="92" rx="10"/>
  </g>
  <g text-anchor="middle" class="body"><text x="122" y="230">Device</text><text x="122" y="253">tasks</text><text x="243" y="230">Device</text><text x="243" y="253">tasks</text><text x="122" y="380">Device</text><text x="243" y="380">Device</text></g>
  <text x="183" y="450" text-anchor="middle" class="small">Local execution only at the task source</text>

  <rect x="465" y="105" width="270" height="365" class="box" fill="#edf7ee"/>
  <text x="600" y="140" text-anchor="middle" class="label">Edge layer</text>
  <g fill="#93c47d" stroke="#38761d" stroke-width="2"><rect x="500" y="185" width="82" height="100" rx="10"/><rect x="620" y="185" width="82" height="100" rx="10"/><rect x="500" y="330" width="82" height="100" rx="10"/><rect x="620" y="330" width="82" height="100" rx="10"/></g>
  <g text-anchor="middle" class="body"><text x="541" y="230">Edge</text><text x="541" y="252">server</text><text x="661" y="230">Edge</text><text x="661" y="252">server</text><text x="541" y="375">Edge</text><text x="541" y="397">server</text><text x="661" y="375">Edge</text><text x="661" y="397">server</text></g>
  <text x="600" y="450" text-anchor="middle" class="small">Reachable servers with shared CPU capacities</text>

  <rect x="882" y="105" width="270" height="365" class="box" fill="#f6edf8"/>
  <text x="1017" y="140" text-anchor="middle" class="label">Cloud layer</text>
  <g fill="#b4a7d6" stroke="#674ea7" stroke-width="2"><rect x="920" y="205" width="85" height="125" rx="10"/><rect x="1030" y="205" width="85" height="125" rx="10"/></g>
  <g text-anchor="middle" class="body"><text x="963" y="258">Cloud</text><text x="963" y="281">server</text><text x="1072" y="258">Cloud</text><text x="1072" y="281">server</text></g>
  <text x="1017" y="450" text-anchor="middle" class="small">Fixed legal relay path for each selected cloud</text>

  <path d="M318 230 C370 200, 410 200, 465 230" class="line"/><path d="M318 385 C370 355, 410 355, 465 385" class="line"/>
  <path d="M735 230 C790 205, 830 205, 882 230" class="line"/><path d="M735 385 C790 355, 830 355, 882 310" class="line"/>
  <text x="390" y="185" text-anchor="middle" class="small">device-edge uplink</text><text x="805" y="185" text-anchor="middle" class="small">edge-cloud backhaul</text>
  <text x="600" y="525" text-anchor="middle" class="small">The optimizer selects a legal execution node and a CPU-frequency allocation; it does not optimise wireless resources or routing.</text>
</svg>
