system:
  mobile_devices: 20
  edge_servers: 4
  cloud_servers: 2
  tasks: 40

experiment:
  seed_start: 20260701
  independent_runs: 30
  population_size: 50
  max_iterations: 150

weights:
  energy: 0.15
  delay: 0.15
  aoi: 0.20
  qoe: 0.25
  fairness: 0.25

weight_settings:
  - setting: S1
    description: Original setting
    weights:
      energy: 0.15
      delay: 0.15
      aoi: 0.20
      qoe: 0.25
      fairness: 0.25
  - setting: S2
    description: Equal weighting
    weights:
      energy: 0.20
      delay: 0.20
      aoi: 0.20
      qoe: 0.20
      fairness: 0.20
  - setting: S3
    description: Energy-delay priority
    weights:
      energy: 0.25
      delay: 0.25
      aoi: 0.20
      qoe: 0.15
      fairness: 0.15
  - setting: S4
    description: QoE-fairness priority
    weights:
      energy: 0.10
      delay: 0.10
      aoi: 0.15
      qoe: 0.325
      fairness: 0.325
  - setting: S5
    description: AoI-freshness priority
    weights:
      energy: 0.125
      delay: 0.125
      aoi: 0.35
      qoe: 0.20
      fairness: 0.20
  - setting: S6
    description: Physical terms only (E+D+A)
    weights:
      energy: 0.30
      delay: 0.30
      aoi: 0.40
      qoe: 0.00
      fairness: 0.00
  - setting: S7
    description: Physical terms and aggregate QoE (E+D+A+Q)
    weights:
      energy: 0.20
      delay: 0.20
      aoi: 0.25
      qoe: 0.35
      fairness: 0.00

utility_settings:
  - setting: U1
    description: Canonical task-utility coefficients
    weights: {delay: 0.45, energy: 0.30, aoi: 0.25}
  - setting: U2
    description: Equal task-utility coefficients
    weights: {delay: 0.3333333333333333, energy: 0.3333333333333333, aoi: 0.3333333333333333}
  - setting: U3
    description: Freshness-oriented task utility
    weights: {delay: 0.30, energy: 0.20, aoi: 0.50}

penalty_grid:
  lambda0:
    - 0.5
    - 1.0
    - 2.0
  alpha:
    - 1.0
    - 2.0
    - 3.0

capacity_scales: [0.8, 1.0, 1.2]
sla_scales: [0.8, 1.0, 1.2]
server_heterogeneity_scales: [0.0, 1.0, 1.5]
